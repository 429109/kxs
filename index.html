<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱看小说 | 欢迎光临</title>
    <meta name="description" content="爱看小说，提供优质商品和服务">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --accent-color: #ffe66d;
            --dark-color: #2d3436;
            --light-color: #f8f9fa;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --gradient-xhs: linear-gradient(135deg, #ff2442 0%, #ff6b6b 100%);
            --gradient-xy: linear-gradient(135deg, #ffd93d 0%, #ff6b6b 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: var(--dark-color);
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部 */
        .header {
            text-align: center;
            padding: 40px 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #fff;
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: var(--gradient-1);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        /* 卡片通用样式 */
        .section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .section-title {
            text-align: center;
            font-size: 1.3rem;
            color: var(--dark-color);
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .section-title .icon {
            font-size: 1.5rem;
        }

        /* 卡片网格 */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid #f0f0f0;
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-1);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            border-color: transparent;
        }

        .card-icon {
            width: 65px;
            height: 65px;
            border-radius: 16px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .card-icon.catalog {
            background: var(--gradient-1);
        }

        .card-icon.xhs {
            background: var(--gradient-xhs);
        }

        .card-icon.xy {
            background: var(--gradient-xy);
        }

        .card-name {
            font-size: 0.95rem;
            color: var(--dark-color);
            font-weight: 600;
            line-height: 1.4;
        }

        .card-desc {
            font-size: 0.75rem;
            color: #999;
            margin-top: 5px;
        }

        /* 访客统计 */
        .visitor-stats {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            text-align: center;
        }

        .stat-item {
            padding: 15px 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            margin-bottom: 8px;
        }

        .stat-value {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .stat-value#total-visitors {
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-value#today-visitors {
            background: var(--gradient-2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-value#ip-address {
            background: var(--gradient-3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1rem;
        }

        /* 页脚 */
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .social-link {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .social-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header,
        .section {
            animation: fadeInUp 0.6s ease forwards;
        }

        .section:nth-child(2) {
            animation-delay: 0.1s;
        }

        .section:nth-child(3) {
            animation-delay: 0.2s;
        }

        .section:nth-child(4) {
            animation-delay: 0.3s;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.6rem;
            }

            .cards-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }

            .card {
                padding: 20px 10px;
            }

            .card-icon {
                width: 55px;
                height: 55px;
                font-size: 1.6rem;
            }

            .card-name {
                font-size: 0.85rem;
            }

            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }

            .stat-value {
                font-size: 1.1rem;
            }

            .container {
                padding: 15px;
            }

            .section {
                padding: 25px 20px;
            }
        }

        @media (max-width: 480px) {
            .cards-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .card {
                padding: 15px 8px;
            }

            .card-icon {
                width: 50px;
                height: 50px;
                font-size: 1.4rem;
            }

            .card-name {
                font-size: 0.75rem;
            }

            .header h1 {
                font-size: 1.4rem;
            }
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

    <script>
        // 访客统计功能
        // 使用 busuanzi 第三方统计服务（免费，无需后端）
        // 在 GitHub Pages 中可以直接使用
        
        // 方法 1: 使用 busuanzi (推荐)
        // 在 </body> 前添加以下脚本
        const initVisitorCounter = () => {
            // 创建 busuanzi 脚本
            const script = document.createElement('script');
            script.src = '//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js';
            script.async = true;
            document.body.appendChild(script);
            
            // 等待统计加载
            setTimeout(() => {
                const totalVisitors = document.getElementById('total-visitors');
                const todayVisitors = document.getElementById('today-visitors');
                
                if (totalVisitors) {
                    totalVisitors.innerHTML = '<span id="busuanzi_value_site_pv">-</span>';
                }
                if (todayVisitors) {
                    todayVisitors.innerHTML = '<span id="busuanzi_value_site_uv">-</span>';
                }
            }, 500);
        };
        
        // 获取用户 IP 地址
        const fetchUserIP = () => {
            const ipElement = document.getElementById('ip-address');
            
            // 使用多个 IP API 作为备选
            const ipAPIs = [
                'https://api.ipify.org?format=json',
                'https://ipapi.co/json/',
                'https://ipinfo.io/json'
            ];
            
            const fetchIP = async (index = 0) => {
                if (index >= ipAPIs.length) {
                    ipElement.innerHTML = '获取失败';
                    return;
                }
                
                try {
                    const response = await fetch(ipAPIs[index]);
                    const data = await response.json();
                    const ip = data.ip || '未知 IP';
                    ipElement.innerHTML = ip;
                } catch (error) {
                    console.log(`IP API ${index} 失败，尝试下一个...`);
                    fetchIP(index + 1);
                }
            };
            
            fetchIP();
        };
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            initVisitorCounter();
            fetchUserIP();
        });
        
        // 卡片点击效果
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href && href !== '#') {
                    // 可以在这里添加点击统计
                    console.log('卡片被点击:', this.querySelector('.card-name').textContent);
                }
            });
        });
    </script>
